<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Task Manager</title>
  </head>
  <body>
    <label>
      Task
      <input id="task_name" type="text" placeholder="Enter task name.." />
    </label>

    <br /><br />

     <label>
  Status
  <select id="status">
    <option aria-placeholder="select"></option>
    <option value="Pending">Pending</option>
    <option value="In Progress">In Progress</option>
    <option value="On Hold">On Hold</option>
    <option value="Completed">Completed</option>
    <option value="Cancelled">Cancelled</option>
  </select>
</label>

    <br /><br />

    <button onclick="submitTask()">Submit</button>

    <br /><br />

    <h2>Task List</h2>

    <table border="1" id="taskTable">
      <thead>
        <tr>
          <th>ID</th>
          <th>Task Name</th>
          <th>Status</th>
          <th>Action</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>

    <script>
      function submitTask() {
        let taskName = document.getElementById("task_name").value;
        let status = document.getElementById("status").value;

        fetch("http://127.0.0.1:8000/api/tasks", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
          },
          body: JSON.stringify({ task_name: taskName, status: status }),
        })
          .then((response) => response.json())
          .then((data) => {
            alert("Task created successfully!");
            loadTasks();
          })
          .catch((error) => console.error(error));
      }

      function loadTasks() {
        fetch("http://127.0.0.1:8000/api/tasks")
          .then((response) => response.json())
          .then((data) => {
            let tableBody = document.querySelector("#taskTable tbody");
            tableBody.innerHTML = "";

            data.forEach((task) => {
              let row = `
              <tr>
                <td>${task.id}</td>
                <td>${task.task_name}</td>
                <td>${task.status}</td>
                <td>
                  <a href="https://prince9559.github.io/UI_task_manager/update.html?id=${task.id}&task_name=${encodeURIComponent(task.task_name)}&status=${encodeURIComponent(task.status)}">
                    <button>Update</button>
                  </a>

                  <a href="https://prince9559.github.io/UI_task_manager/delete.html?id=${task.id}">
                    <button>Delete</button>
                  </a>
                </td>
              </tr>
              `;
              tableBody.innerHTML += row;
            });
          })
          .catch((error) => console.error(error));
      }

      loadTasks();
    </script>
  </body>
</html>
