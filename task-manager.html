<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Task Manager</title>
  </head>
  <body>
    <label>
      Task
      <input id="task_name" type="text" placeholder="Enter task name.." />
    </label>

    <br /><br />

    <label>
      Status
      <input id="status" list="t1" type="text" placeholder="Select status.." />
    </label>

    <datalist id="t1">
      <option value="Pending"></option>
      <option value="In Progress"></option>
      <option value="On Hold"></option>
      <option value="Completed"></option>
      <option value="Cancelled"></option>
    </datalist>
    <br /><br />

    <button onclick="submitTask()">Submit</button>

    <br /><br />

    <h2>Task List</h2>

    <table border="1" id="taskTable">
      <thead>
        <tr>
          <th>ID</th>
          <th>Task Name</th>
          <th>Status</th>
          <th>Action</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>

    <script>
      function submitTask() {
        let taskName = document.getElementById("task_name").value;
        let status = document.getElementById("status").value;

        fetch("http://127.0.0.1:8000/api/tasks", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
          },
          body: JSON.stringify({ task_name: taskName, status: status }),
        })
          .then((response) => response.json())
          .then((data) => {
            console.log(data);
            alert("Task created successfully!");
            loadTasks();
          })
          .catch((error) => {
            console.error("Error:", error);
          });
      }

      function loadTasks() {
        fetch("http://127.0.0.1:8000/api/tasks")
          .then((response) => response.json())
          .then((data) => {
            let tableBody = document.querySelector("#taskTable tbody");
            tableBody.innerHTML = "";

            data.forEach((task) => {
            let row = `
                <tr>
                <td>${task.id}</td>
                <td>${task.task_name}</td>
                <td>${task.status}</td>
                <td>
                <button>Update</button>
                <button>Delete</button>
                </td>
                </tr>
                `;
              tableBody.innerHTML += row;
            });
          })
          .catch((error) => console.error(error));
      }

      loadTasks();
    </script>
  </body>
</html>
