<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Delete Task</title>
</head>
<body>

<h2>Delete Task</h2>

<label>Task ID:</label>
<input type="number" id="task_id" placeholder="Enter ID"><br><br>
<button onclick="deleteTask()">Delete Task</button>

<p id="response"></p>

<script>
function deleteTask() {
    let id = document.getElementById('task_id').value;

    fetch(`http://127.0.0.1:8000/api/tasks/${id}`, {
        method: 'DELETE',
        headers: {
            'Accept': 'application/json'
        }
    })
    .then(res => res.json())
    .then(data => {
        document.getElementById('response').innerText = data.message;
        console.log(data);
    })
    .catch(err => console.log(err));
}
</script>

</body>
</html>
