<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Delete Task</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #f4f6f8;
            padding: 30px;
            color: #333;
        }

        h2 {
            text-align: center;
            margin-bottom: 25px;
            color: #c0392b;
        }

        .form-container {
            max-width: 400px;
            margin: 0 auto;
            background-color: #fff;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-weight: 600;
        }

        input[type="number"] {
            width: 100%;
            padding: 10px 12px;
            border-radius: 6px;
            border: 1px solid #ccc;
            font-size: 16px;
            transition: 0.2s;
        }

        input[type="number"]:focus {
            border-color: #e74c3c;
            outline: none;
            box-shadow: 0 0 5px rgba(231, 76, 60, 0.3);
        }

        button {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
            background-color: #e74c3c; 
            color: white;
            font-weight: bold;
            transition: 0.3s;
        }

        button:hover {
            opacity: 0.9;
        }

        #response {
            margin-top: 20px;
            font-weight: 600;
            text-align: center;
            color: #c0392b;
        }

        @media (max-width: 600px) {
            .form-container {
                width: 95%;
            }
            input, button {
                font-size: 14px;
                padding: 10px;
            }
        }
    </style>
</head>
<body>

<h2>Delete Task</h2>

<div class="form-container">
    <div class="form-group">
    <label>Task ID:</label>
    <input type="number" id="task_id" readonly>
    </div>

    <button onclick="deleteTask()">Delete Task</button>
    <p id="response"></p>

</div>

<script>
    
    let params = new URLSearchParams(window.location.search);
    let id = params.get("id");

    document.getElementById("task_id").value = id;

    function deleteTask() {
        if (!confirm("Are you sure you want to delete this task?")) {
            return;
        }

        let id = document.getElementById('task_id').value;

        fetch(`http://127.0.0.1:8000/api/tasks/${id}`, {
            method: 'DELETE',
            headers: {
                'Accept': 'application/json'
            }
        })
        .then(res => res.json())
        .then(data => {
            document.getElementById('response').innerText = data.message;
        })
        .catch(err => console.log(err));
    }
</script>

</body>
</html>
